name: mentishub

include:
  - path: ../../assistant/docker/docker-compose.dev.yml
    env_file: ../env/.env.dev

  - path: ../../platform/docker/docker-compose.dev.yml
    env_file: ../env/.env.dev

services:
  supabase-db:
    image: supabase/postgres:17.6.1.054
    container_name: supabase-db
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - supabase_db_data:/var/lib/postgresql/data
      - ../supabase/init-scripts/roles.sql:/docker-entrypoint-initdb.d/init-scripts/97-roles.sql:Z
      - ../supabase/init-scripts/schemas.sql:/docker-entrypoint-initdb.d/init-scripts/98-schemas.sql:Z
      - ../supabase/init-scripts/service_account.sql:/docker-entrypoint-initdb.d/init-scripts/99-service-account.sql:Z
      - ../supabase/init-scripts/jwt.sql:/docker-entrypoint-initdb.d/init-scripts/99-jwt.sql:Z
    environment:
      PGHOST: 0.0.0.0
      PGPORT: ${POSTGRES_PORT}
      POSTGRES_PORT: ${POSTGRES_PORT}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_SERVICE_PASSWORD: ${POSTGRES_SERVICE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: ${JWT_EXPIRY}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "max_wal_senders=10"
    networks:
      - mentishub-network

  supabase-auth:
    image: supabase/gotrue:v2.183.0
    container_name: supabase-auth
    depends_on:
      supabase-db:
        condition: service_healthy
    ports:
      - "9999:9999"
    networks:
      - mentishub-network
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}

      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@supabase-db:${POSTGRES_PORT}/${POSTGRES_DB}

      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS}
      GOTRUE_DISABLE_SIGNUP: ${DISABLE_SIGNUP}

      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}

      GOTRUE_EXTERNAL_EMAIL_ENABLED: ${ENABLE_EMAIL_SIGNUP}
      GOTRUE_MAILER_AUTOCONFIRM: ${ENABLE_EMAIL_AUTOCONFIRM}

      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL}
      GOTRUE_SMTP_HOST: ${SMTP_HOST}
      GOTRUE_SMTP_PORT: ${SMTP_PORT}
      GOTRUE_SMTP_USER: ${SMTP_USER}
      GOTRUE_SMTP_PASS: ${SMTP_PASS}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME}
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: ${MAILER_URLPATHS_CONFIRMATION}
      GOTRUE_MAILER_URLPATHS_RECOVERY: ${MAILER_URLPATHS_RECOVERY}
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: ${MAILER_URLPATHS_EMAIL_CHANGE}
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:9999/health",
        ]
      timeout: 5s
      interval: 5s
      retries: 3

  supabase-rest:
    image: postgrest/postgrest:v14.1
    container_name: supabase-rest
    ports:
      - "3004:3000"
    networks:
      - mentishub-network
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@supabase-db:${POSTGRES_PORT}/${POSTGRES_DB}
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS}
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY}
    depends_on:
      supabase-db:
        condition: service_healthy

  supabase-storage:
    image: supabase/storage-api:v1.32.1
    container_name: supabase-storage
    ports:
      - "5000:5000"
    volumes:
      - supabase_storage_data:/var/lib/storage:z
    networks:
      - mentishub-network
    environment:
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://supabase-rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@supabase-db:${POSTGRES_PORT}/${POSTGRES_DB}
      REQUEST_ALLOW_X_FORWARDED_PATH: "true"
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:5000/status",
        ]
      timeout: 5s
      interval: 5s
      retries: 3
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-rest:
        condition: service_started

  supabase-storage-init:
    image: curlimages/curl:8.18.0
    container_name: supabase-storage-init
    networks:
      - mentishub-network
    environment:
      SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
    volumes:
      - ../supabase/init-storage-buckets.sh:/init-storage-buckets.sh:ro
    entrypoint: ["/bin/sh", "/init-storage-buckets.sh"]
    depends_on:
      supabase-storage:
        condition: service_healthy
    restart: "no"

  supabase-kong:
    image: kong:3.9.1
    container_name: supabase-kong
    ports:
      - "${KONG_HTTP_PORT}:8000"
      - "${KONG_HTTPS_PORT}:8443"
    volumes:
      - ../supabase/kong.yml:/home/kong/kong.yml:ro
    networks:
      - mentishub-network
    environment:
      KONG_DATABASE: "off"
      KONG_VAULTS: env
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
    depends_on:
      supabase-auth:
        condition: service_healthy
      supabase-rest:
        condition: service_started
      supabase-storage:
        condition: service_healthy

  supabase-studio:
    image: supabase/studio:2025.12.01-sha-4ad48b7
    container_name: supabase-studio
    ports:
      - "3005:3000"
    depends_on:
      supabase-kong:
        condition: service_started
    networks:
      - mentishub-network
    environment:
      HOSTNAME: "::"
      STUDIO_PG_META_URL: http://supabase-meta:8080
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_HOST: supabase-db
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}

  supabase-meta:
    image: supabase/postgres-meta:v0.95.0
    container_name: supabase-meta
    depends_on:
      supabase-db:
        condition: service_healthy
    networks:
      - mentishub-network
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: supabase-db
      PG_META_DB_PORT: ${POSTGRES_PORT}
      PG_META_DB_NAME: ${POSTGRES_DB}
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}

  vault:
    image: hashicorp/vault:1.21
    container_name: vault
    ports:
      - "8200:8200"
    environment:
      VAULT_API_ADDR: http://0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    volumes:
      - vault_data:/vault/file
      - vault_certs:/vault/certs
      - ../vault/config.hcl:/vault/config/config.hcl
    networks:
      - mentishub-network
    command: server
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "-q",
          "http://127.0.0.1:8200/sys/health?standbyok=true",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  vault-init:
    image: hashicorp/vault:1.21
    container_name: vault-init
    volumes:
      - vault_data:/vault/file
      - vault_certs:/vault/certs
      - ../vault/init.sh:/init.sh:ro
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_ROLE_ID: ${VAULT_ROLE_ID}
      VAULT_SECRET_ID: ${VAULT_SECRET_ID}
      CERT_DOMAIN: ${CERT_DOMAIN:-localhost}
    networks:
      - mentishub-network
    entrypoint: /bin/sh
    command: ["-c", "apk add --no-cache jq && /init.sh"]
    depends_on:
      vault:
        condition: service_healthy
    restart: "no"

  vault-agent-otel:
    image: hashicorp/vault:1.21
    container_name: vault-agent-otel
    user: "0:0"
    volumes:
      - vault_certs:/etc/otel/creds:ro
      - otel_certs:/etc/otel/certs
      - ../observability/vault-agent.hcl:/vault/config/vault-agent.hcl:ro
      - ../observability/templates:/vault/templates:ro
    networks:
      - mentishub-network
    entrypoint: ["/bin/sh", "-c"]
    command: ["vault agent -config=/vault/config/vault-agent.hcl"]
    depends_on:
      vault-init:
        condition: service_completed_successfully
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.140.0
    container_name: otel-collector
    volumes:
      - ../observability/otel-collector.yaml:/etc/otelcol/config.yaml
      - otel_certs:/etc/otel/certs:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
      - "55679:55679"
    networks:
      - mentishub-network
    depends_on:
      vault-agent-otel:
        condition: service_started

  prometheus:
    image: prom/prometheus:v3.8.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - mentishub-network
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    depends_on:
      - otel-collector

  #loki:
  #  image: grafana/loki:3.5.8
  #  container_name: loki
  #  ports:
  #    - "3100:3100"
  #  volumes:
  #    - ../observability/loki.yaml:/etc/loki/local-config.yaml
  #    - loki_data:/loki
  #  networks:
  #    - mentishub-network
  #  command: -config.file=/etc/loki/local-config.yaml
  #  depends_on:
  #    - otel-collector

  #tempo:
  #  image: grafana/tempo:main-28beefe
  #  container_name: tempo
  #  ports:
  #    - "3200:3200"
  #  volumes:
  #    - ../observability/tempo.yaml:/etc/tempo/tempo.yaml
  #    - tempo_data:/var/tempo
  #  networks:
  #    - mentishub-network
  #  command: ["-config.file=/etc/tempo/tempo.yaml"]

  grafana:
    image: grafana/grafana:12.1
    container_name: grafana
    ports:
      - "3006:3000"
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    networks:
      - mentishub-network
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: false
    depends_on:
      - prometheus
      - loki
      - tempo

volumes:
  supabase_db_data:
  supabase_storage_data:
  prometheus_data:
  #loki_data:
  #tempo_data:
  grafana_data:
  vault_certs:
  vault_data:
  otel_certs:

networks:
  mentishub-network:
    name: mentishub-network
    driver: bridge
